<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #22c55e;
    }
    .header .version {
      font-size: 11px;
      color: #666;
    }
    .status-bar {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status-bar .label { color: #999; font-size: 11px; }
    .status-bar .value { color: #fff; font-weight: 600; margin-top: 2px; }
    .status-bar.unsupported { border-color: #b91c1c; }
    .status-bar.ready { border-color: #22c55e; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #22c55e; color: #000; }
    .btn-secondary { background: #262626; color: #e5e5e5; border: 1px solid #333; }

    .result {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }
    .result.show { display: block; }
    .result.success { border-color: #22c55e; }
    .result.error { border-color: #ef4444; }

    .job-count { font-size: 24px; font-weight: 700; color: #22c55e; }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #262626;
    }
    .settings summary {
      font-size: 12px;
      color: #666;
      cursor: pointer;
      user-select: none;
    }
    .settings input {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 12px;
      outline: none;
    }
    .settings input:focus { border-color: #22c55e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobSniper</h1>
    <span class="version">v0.1</span>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="label">当前页面</div>
    <div class="value" id="statusText">检测中...</div>
  </div>

  <button class="btn btn-primary" id="btnSnipe" disabled>🎯 狙击当前页面</button>
  <button class="btn btn-secondary" id="btnSubmit" disabled style="display:none">📤 发送到 JobSniper</button>

  <div class="result" id="result">
    <div id="resultContent"></div>
  </div>

  <div class="settings">
    <details>
      <summary>⚙️ 设置</summary>
      <input type="text" id="apiBase" placeholder="API 地址 (默认 http://localhost:3000)">
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
